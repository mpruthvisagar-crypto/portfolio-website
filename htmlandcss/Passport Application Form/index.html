<!DOCTYPE html>
<html >
<head>
    <title>Passport Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Passport Application Form</h2>
        <fieldset>
            <legend>Personal Details</legend>   

            <label >Full Name</label>
            <input type="text" autofocus placeholder="Enter full name" required>

            <label >Date of Birth</label>
            <input type="date">

            <label>Gender</label><br>
            <input type="radio" name="gender" >Male
            <input type="radio" name="gender" >Female
            <input type="radio" name="gender" >Other
            <br>

            <label>Marital Status</label>
            <select>
                <option value="">Select</option>
                <option>Unmarried</option>
                <option>Married</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Contact Details</legend>

            <label >Email</label>
            <input type="email" placeholder="Enter email" required>

            <label >Phone Number</label>
            <input type="tel" placeholder="Enter phone number" pattern="[0-9]{10}" required>

            <label>Address</label>
            <textarea row="10" column="10" ></textarea>
        </fieldset>
        <fieldset>
            <legend>Passport Details</legend>

            <label>Type of Application</label><br>
            <input type="radio" name="appication">New Passport
            <input type="radio" name="appication">Reissue<br>

            <label>Passport Booklet Type</label><br>
            <input type="checkbox" >36 Pages
            <input type="checkbox" >60 Pages
<br>
            <label>Upload Proof</label>
            <input type="file" >
        </fieldset>

        <fieldset>
            <legend>Declaration</legend>
            <input type="checkbox" required> I hereby declare that the information provided is true and true.
        </fieldset>
        <button>Submit</button>
        <button>Clear</button>
    </form>
</body>
</html>
