<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced CSS Animations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<style>
    body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to left, #f307ef, #764ba2);
    text-align: center; 
    }
    .main{
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }
     
    .card{
        width: 260px;
        background: linear-gradient(to right, yellow, #01651c);
        border-radius: 25px;
        padding: 20px;
        border: 5px solid skyblue;
        transition: all 0.3s ease-in-out;
    }
    .card:hover{
        transform: translate(5px, -5px );
       box-shadow: 5px 5px 10px greenyellow;
    }
     h1{
        transition:all 0.3s ease;
     }
h1:hover{
    color:greenyellow;
    transform: translateY(-5px);
    box-shadow: 5px 5px 15px red;    
}
button{
    background-color:skyblue;
    border-radius: 100%;
    font-weight: bold;
    transition: all 0.3s ease;
    padding:10px
}
button:hover{
    background-color:rgb(137, 10, 137);
    transform: scale(1.1);
        color:white
}
   .slide-card{
        animation: slideIn 2s ease infinite;
    }
    @keyframes slideIn {
        from{
            transform: translateX(-100%);
        }
        to{
            transform: translateX(0);
        }  
    }
    .bounce-card{
        animation: bounce 2s ease infinite;
    }
    @keyframes bounce {
        0%{
            transform: translateY(0);
        }
        100%{
            transform: translateY(-20px);
        }
    }
    .rotate-card{
        animation: rotate 10s ease infinite;
    }
    @keyframes rotate {
        from{
            transform: rotate(0deg);
        }
        to{
            transform: rotate(360deg);
        }
    }
    .pulse-card{
        animation: pulse 1.2s ease infinite;
    }
    @keyframes pulse {
        0%{
            transform: scale(1);
            opacity: 1;
        }
        50%{
            transform: scale(1.2);
            opacity: 1;
        }
        100%{
            transform: scale(1);
            opacity: 1;
        }

    }
    .loader{
        border-radius: 50%;
        width: 50px;
        height: 50px;
        border: 5px solid whitesmoke;
        margin-left: 50%;
        margin-right: 25px;
        border-top: 5px solid transparent;
        animation: spin 2s linear infinite;
    }

    @keyframes spin {
        from{
            transform: rotate(0deg);
        }
        to{
            transform: rotate(360deg);
        }
    }
</style>
<body>
<h1>
    Animation Examples
</h1>
<div class="main">
     <div class =" card slide-card">
        <h2>slide card</h2>
        <button>Click Me</button>
     </div>
 <div class ="card bounce-card">
        <h2>bounce card</h2>
        <button>Click Me</button>
        </div>
       <div class ="card rotate-card">
        <h2>rotate card</h2>
        <button>Click Me</button>
        </div>  
<div class ="card pulse-card">
        <h2>pulse card</h2>
        <button>Click Me</button>
        </div>  
        <div class ="card">
            <div class="loader"></div>
        <h2>loader card</h2>
        <button>Click Me</button>
        </div>
       
</body>
</html>
