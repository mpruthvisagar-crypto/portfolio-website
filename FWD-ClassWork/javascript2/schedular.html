<script>
    let count = 0;
    let id = setInterval(() => {
        count++;
        console.log(count);
        if(count%10 === 0){
            let msg = prompt("enter stop to stop the counter");
            if(msg === "stop"){
                clearInterval(id);
                console.log("interval cleared");
            }
        }
    }, 1000);
    setInterval(() => {
        console.log("good afternoon");

    },3000);
</script>
